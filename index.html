<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lemon OG Session Picker</title>
<style>
* {
  box-sizing: border-box;
  margin: 0;
  padding: 0;
}

body {
  margin: 0;
  padding: 0;
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
  background: #ffffff;
}

.widget {
  background: #ffffff;
  padding: 28px 24px 32px;
  max-width: 560px;
  margin: 0 auto;
}

.widget-label {
  font-size: 11px;
  font-weight: 700;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  color: #1B3A2F;
  margin-bottom: 6px;
}

.widget-heading {
  font-size: 20px;
  font-weight: 700;
  color: #1B3A2F;
  margin-bottom: 6px;
  line-height: 1.25;
}

.widget-subheading {
  font-size: 14px;
  color: #666;
  margin-bottom: 22px;
  line-height: 1.5;
}

.cards {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 10px;
  margin-bottom: 20px;
}

.card {
  border: 1.5px solid #e8ede8;
  border-radius: 12px;
  padding: 16px 12px 14px;
  cursor: pointer;
  text-align: center;
  background: #ffffff;
  transition: border-color 0.18s ease, background 0.18s ease, transform 0.12s ease;
  user-select: none;
  -webkit-tap-highlight-color: transparent;
}

.card:hover {
  border-color: #1B3A2F;
  background: #f4f8f4;
  transform: translateY(-1px);
}

.card.selected {
  border-color: #1B3A2F;
  background: #1B3A2F;
}

.card.selected .card-emoji {
  filter: none;
}

.card.selected .card-title {
  color: #ffffff;
}

.card.selected .card-desc {
  color: rgba(255,255,255,0.75);
}

.card-emoji {
  font-size: 26px;
  display: block;
  margin-bottom: 8px;
  line-height: 1;
}

.card-title {
  font-size: 13px;
  font-weight: 700;
  color: #1B3A2F;
  margin-bottom: 3px;
  line-height: 1.2;
}

.card-desc {
  font-size: 11px;
  color: #888;
  line-height: 1.35;
}

.result {
  border-radius: 12px;
  padding: 18px 20px;
  background: #f4f8f4;
  border-left: 4px solid #1B3A2F;
  display: none;
  animation: fadeSlide 0.25s ease;
}

.result.visible {
  display: block;
}

@keyframes fadeSlide {
  from { opacity: 0; transform: translateY(6px); }
  to   { opacity: 1; transform: translateY(0); }
}

.result-amount {
  font-size: 11px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 0.08em;
  color: #1B3A2F;
  margin-bottom: 4px;
}

.result-amount span {
  display: inline-block;
  background: #1B3A2F;
  color: #ffffff;
  border-radius: 6px;
  padding: 2px 9px;
  font-size: 11px;
}

.result-title {
  font-size: 16px;
  font-weight: 700;
  color: #1B3A2F;
  margin: 6px 0 5px;
  line-height: 1.3;
}

.result-body {
  font-size: 13px;
  color: #444;
  line-height: 1.6;
}

.result-tip {
  margin-top: 10px;
  font-size: 12px;
  color: #1B3A2F;
  font-weight: 600;
}

.result-tip::before {
  content: "💡 ";
}

.result-cta {
  display: inline-block;
  margin-top: 14px;
  background: #1B3A2F;
  color: #ffffff;
  text-decoration: none;
  font-size: 13px;
  font-weight: 700;
  padding: 10px 20px;
  border-radius: 12px;
  transition: background 0.15s ease, transform 0.1s ease;
  -webkit-tap-highlight-color: transparent;
}

.result-cta:hover {
  background: #142d24;
  transform: translateY(-1px);
}

.result-cta:active {
  transform: translateY(0);
}

@media (max-width: 400px) {
  .widget {
    padding: 22px 16px 26px;
  }
  .card {
    padding: 13px 8px 11px;
  }
  .card-emoji {
    font-size: 22px;
  }
  .card-title {
    font-size: 12px;
  }
  .card-desc {
    font-size: 10px;
  }
  .widget-heading {
    font-size: 18px;
  }
}
</style>
</head>
<body>

<div class="widget">
  <p class="widget-label">Lemon OG</p>
  <h2 class="widget-heading">What kind of session are you planning?</h2>
  <p class="widget-subheading">Tap a vibe to see where on the arc you'll land.</p>

  <div class="cards">

    <div class="card" data-id="social" onclick="selectCard(this)">
      <span class="card-emoji">🌿</span>
      <p class="card-title">Social hang</p>
      <p class="card-desc">Friends, conversation, staying present</p>
    </div>

    <div class="card" data-id="chill" onclick="selectCard(this)">
      <span class="card-emoji">🎬</span>
      <p class="card-title">Wind down</p>
      <p class="card-desc">Movie, music, no plans to move</p>
    </div>

    <div class="card" data-id="deep" onclick="selectCard(this)">
      <span class="card-emoji">🌙</span>
      <p class="card-title">Full switch-off</p>
      <p class="card-desc">End of day, body and mind off duty</p>
    </div>

  </div>

  <div class="result" id="result">
    <p class="result-amount">Recommended amount: <span id="result-amount-tag"></span></p>
    <p class="result-title" id="result-title"></p>
    <p class="result-body" id="result-body"></p>
    <p class="result-tip" id="result-tip"></p>
    <a id="result-cta" class="result-cta" href="https://mood.com/product/thca-lemon-og-disposable-vape/dose-2g" target="_blank" rel="noopener"></a>
  </div>
</div>

<script>
var results = {
  social: {
    amount: "1–2 puffs",
    title: "Limonene leads. You're in the social zone.",
    body: "The cerebral phase dominates here. Mood lifts, conversation flows, and the body stays loose without going heavy. This is where the \"Social\" label earns its name.",
    tip: "Onset is nearly immediate. Start slow and let it land before topping up.",
    cta: "Try THCa Lemon OG Disposable Vape 2g"
  },
  chill: {
    amount: "3–4 puffs",
    title: "The balance shifts. Myrcene steps in.",
    body: "Body relaxation arrives earlier and starts competing with the uplift. You're still present and conversational, but motivation to do anything else quietly fades. Perfect movie-night territory.",
    tip: "Peak hits around 30 minutes. Plan accordingly.",
    cta: "Try THCa Lemon OG Disposable Vape 2g"
  },
  deep: {
    amount: "5+ puffs",
    title: "Myrcene takes over. Full couch-lock incoming.",
    body: "Sedation dominates. The couch-lock qualities arrive faster and hold. This is evening-only territory. Not the call if anything productive is still on the list.",
    tip: "The arc runs 2–3 hours. Fast, clean, and complete.",
    cta: "Try THCa Lemon OG Disposable Vape 2g"
  }
};

function selectCard(el) {
  var cards = document.querySelectorAll('.card');
  for (var i = 0; i < cards.length; i++) {
    cards[i].classList.remove('selected');
  }
  el.classList.add('selected');

  var id = el.getAttribute('data-id');
  var data = results[id];

  document.getElementById('result-amount-tag').textContent = data.amount;
  document.getElementById('result-title').textContent = data.title;
  document.getElementById('result-body').textContent = data.body;
  document.getElementById('result-tip').textContent = data.tip;
  document.getElementById('result-cta').textContent = data.cta;

  var result = document.getElementById('result');
  result.classList.remove('visible');
  void result.offsetWidth;
  result.classList.add('visible');
}
</script>

</body>
</html>
